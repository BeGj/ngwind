name: pages

# Deploys the demo showcase app to GitHub Pages on every push to main, so the
# site always reflects the latest released library code.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

# Allow one Pages deployment at a time; never cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: install deps
        run: pnpm install --frozen-lockfile

      - name: build library
        run: pnpm build:lib

      # base-href must match the project-pages path: https://begj.github.io/ngwind/
      - name: build demo
        run: pnpm exec ng build demo --base-href=/ngwind/

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/demo/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from this workflow
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
